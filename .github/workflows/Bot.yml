      - name: Processar com Java
        id: processor
        run: |
          javac chat.java
          # Executa o java e guarda o resultado bruto
          RAW_OUT=$(java chat "${{ github.event.comment.body }}")
          
          # Separa o tipo de aĂ§ĂŁo e o conteĂșdo usando o pipe | como divisor
          ACTION_TYPE=$(echo $RAW_OUT | cut -d':' -f1)
          CONTENT=$(echo $RAW_OUT | cut -d'|' -f2)
          TITLE=$(echo $RAW_OUT | cut -d'|' -f2) # Usado apenas se for criar issue
          DESC=$(echo $RAW_OUT | cut -d'|' -f3)  # Usado apenas se for criar issue

          # Salva para os prĂłximos steps usarem
          echo "type=$ACTION_TYPE" >> $GITHUB_OUTPUT
          echo "msg=$CONTENT" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT

      - name: AĂ§ĂŁo - Comentar na Issue
        if: contains(steps.processor.outputs.type, 'COMMENT')
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "${{ steps.processor.outputs.msg }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AĂ§ĂŁo - Criar Nova Issue (Alerta)
        if: contains(steps.processor.outputs.type, 'CREATE_ISSUE')
        run: |
          gh issue create --title "${{ steps.processor.outputs.title }}" --body "${{ steps.processor.outputs.desc }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
