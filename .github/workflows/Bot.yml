name: SFload_Bot_Responder
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  responder:
    runs-on: ubuntu-latest
    if: github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Compilar e Executar
        run: |
          javac chat.java
          # Passa o comentário para o Java e salva a saída
          RESPOSTA=$(java chat "${{ github.event.comment.body }}")
          echo "RESPOSTA_BOT=$RESPOSTA" >> $GITHUB_ENV

      - name: Postar no Chat
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$RESPOSTA_BOT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
