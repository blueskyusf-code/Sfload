name: SFload_Bot_Responder

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  respond:
    # Impede que o bot responda a si mesmo
    if: github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Processar e Capturar Resposta
        id: engine
        env:
          USER_MSG: ${{ github.event.comment.body }}
        run: |
          # Executa o Java e salva os prints
          java chat.java > output.txt
          
          # Extrai a mensagem e o status dos prints do Java
          # Usamos o 'sed' para pegar tudo que vem depois de 'RESPOSTA:'
          MSG_FINAL=$(grep "RESPOSTA:" output.txt | sed 's/RESPOSTA://')
          STATUS_FINAL=$(grep "STATUS:" output.txt | sed 's/STATUS://')
          
          # Salva nas variáveis de ambiente do GitHub
          echo "BOT_MSG=$MSG_FINAL" >> $GITHUB_ENV
          echo "BOT_STATUS=$STATUS_FINAL" >> $GITHUB_ENV

      - name: Bot Respondendo no GitHub
        uses: actions/github-script@v6
        with:
          script: |
            const body = process.env.BOT_MSG;
            const status = process.env.BOT_STATUS;

            // O BOT RESPONDE AQUI:
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.trim()
            });

            // Se o Java mandou fechar por causa de insultos:
            if (status.trim() === 'OFF') {
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
            }
            
