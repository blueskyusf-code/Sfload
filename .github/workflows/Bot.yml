name: SFload_Processor
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  executar_logica:
    runs-on: ubuntu-latest
    if: github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Processamento de Dados
        id: proc
        run: |
          # 1. Pega a entrada do App
          INPUT="${{ github.event.comment.body }}"
          
          echo "Processando: $INPUT"

          # 2. EXEMPLO DE PROCESSAMENTO: 
          # Aqui você pode colocar qualquer comando Bash ou Python.
          # Vamos supor que ele conte caracteres e inverta o texto:
          CONTAGEM=$(echo -n "$INPUT" | wc -c)
          INVERTIDO=$(echo "$INPUT" | rev)
          
          # 3. Monta o Log de Saída
          echo "RESULTADO<<EOF" >> $GITHUB_ENV
          echo "--- RELATÓRIO DE PROCESSAMENTO ---" >> $GITHUB_ENV
          echo "📥 ENTRADA: $INPUT" >> $GITHUB_ENV
          echo "📊 BYTES: $CONTAGEM" >> $GITHUB_ENV
          echo "🔄 REVERSO: $INVERTIDO" >> $GITHUB_ENV
          echo "✅ STATUS: Concluído com sucesso." >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Devolver Resultado ao App
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$RESULTADO"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
