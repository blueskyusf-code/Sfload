name: SFload_Logic_Engine
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  brain_process:
    runs-on: ubuntu-latest
    if: github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: Pensar e Montar Quebra-Cabeça
        run: |
          # 1. Obter a mensagem original
          RAW_MSG="${{ github.event.comment.body }}"
          
          # 2. Inverter a mensagem (Processamento 1)
          REVERSED=$(echo "$RAW_MSG" | rev)
          
          # 3. Extrair a primeira palavra (Processamento 2)
          # Pega a primeira palavra e remove símbolos extras
          FIRST_WORD=$(echo "$RAW_MSG" | awk '{print $1}' | sed 's/[^a-zA-Z0-9]//g')

          # 4. Banco de Frases (O Quebra-Cabeça)
          PART1=("Interessante você começar com '$FIRST_WORD'..." "Analisei sua entrada sobre '$FIRST_WORD'..." "Sistema focado em '$FIRST_WORD' iniciado.")
          PART2=("O reflexo invertido disso seria: $REVERSED." "No espelho dos dados, leio: $REVERSED." "A cifra reversa resultou em: $REVERSED.")
          PART3=("Isso abre novas possibilidades! 🚀" "Processamento concluído com sucesso. 🟢" "Aguardando próxima instrução lógica. 🤖")

          # 5. Misturar as peças (Sorteio aleatório)
          F1=${PART1[$RANDOM % ${#PART1[@]}]}
          F2=${PART2[$RANDOM % ${#PART2[@]}]}
          F3=${PART3[$RANDOM % ${#PART3[@]}]}

          # 6. Montar a resposta final
          FINAL_RESPONSE="$F1\n\n$F2\n\n$F3"
          
          # Exportar para o ambiente
          echo "FINAL_MSG<<EOF" >> $GITHUB_ENV
          echo -e "$FINAL_RESPONSE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Postar no App
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$FINAL_MSG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
