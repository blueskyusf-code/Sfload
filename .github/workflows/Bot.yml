name: SFload_Java_Engine
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  java_process:
    runs-on: ubuntu-latest
    if: github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v3
      - name: Rodar Cérebro Java
        run: |
          javac chat.java
          # Passa o comentário como argumento para o Java
          RESULTADO=$(java chat "${{ github.event.comment.body }}")
          
          echo "FINAL_MSG<<EOF" >> $GITHUB_ENV
          echo -e "$RESULTADO" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Postar no App
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$FINAL_MSG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
